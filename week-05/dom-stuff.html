<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dom-stuff</title>
    <style>
        .redBG{
            background-color: red;
            color: brown !important;
        }

        .happy {
            background-color: yellow; 
        }
        .happy h1 {
            text-transform: lowercase;
            color: palevioletred;
        }

        .happy h2{
            text-transform: lowercase;
            color: pink;
        }

        .happy button{
            border-radius: 10px;
            background-color: palevioletred;
            color: blue;
            text-transform: lowercase;
        }

        .sad{
            background-color: blue;
        }
        .sad h1{
            font-size: 14px;
            color: #333;
        }
        .sad h2{
            font-size: 8px;
            color: #333;
        }
        .sad button{

        }

        .angry{
            background-color: orange;
        }

        .angry h1{
            color: darkred;
        }

        .angry h2{
            color: maroon;
        }

        .angry button{
            background-color: black;
            color: white;
        }

    </style>
</head>
<body>
    <h1 id="pageH1">DOM STUFF </h1>
    <h2>Make the page red</h2>
    <button id="makeRed">Click Me</button>

     <h2>Change the h1 text</h2>
    <input type="text" id="newH1" placeholder="enter a new h1">
    <button id="changeH1">Change the H1</button>

    <h2>How are you today?</h2>
    <label for="userMood">
        Enter your mood.
    </label>

    <input type="text" id="userMood" placeholder="happy,sad, angry">
    <button id="processMood">Process Mood</button>

    <script>
        var button = document.querySelector("#makeRed")
        console.log(typeof button);

        button.addEventListener("click",function(){
            var body = document.querySelector("body");
                body.classList.toggle("redBG");

            if(button.innerHTML == "Click Me"){
                button.innerHTML= "change it back";
            } else {
                button.innerHTML = "Click Me";
            }

        });

        var newH1Inout = document.querySelector("#newH1");
        var newH1Input = newH1Inout;
        var newH1Button = document.querySelector("#changeH1");
        var pageH1 = document.querySelector("#pageH1");

        newH1Button.addEventListener("click", function(){
            var inputValue = newH1Input.value;
            pageH1.innerHTML = inputValue;
        })

        var processMoodButton = document.querySelector("#processMood");
        var moodInput = document.querySelector("#userMood");
        var body = document.querySelector("body");
        var body = document.querySelector("body");

        processMoodButton.addEventListener("click", function(){
            var inputValue = moodInput.value;

            if (inputValue=="happy"){
                body.classList.add("happy");
                body.classList.remove("angry");
                body.classList.remove("sad");
                body.classList.remove("redBG");

            } else if (inputValue == "sad" ){
                body.classList.add("sad");
                body.classList.remove("angry");
                body.classList.remove("happy");
                body.classList.remove("redBG");

            } else if (inputValue == "angry" ){
                body.classList.add("angry");
                body.classList.remove("happy");
                body.classList.remove("sad");
                body.classList.remove("redBG");

            } else {
                alert("you must enter one of the following: happy, sad, angry");
            }
        })

    </script>
</body>
</html>
